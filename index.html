<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TechWave</title>
</head>
<body class="bg-[#1A0B2E] font-sans  scroll-smooth">

    <!-- header -->
    <header class="">
        <!-- nav items-->
        <nav class="p-2 border-b-2 border-white/20 flex items-center justify-evenly sm:justify-around">
            <div class="text-4xl font-bold sm:-translate-x-25"><span class="text-white">Tech</span><span class="h-14 bg-linear-to-r from-purple-500  to-pink-600 bg-clip-text text-transparent">Wave</span></div>

            <ul class="hidden lg:flex gap-8 text-gray-200 ">
               <a href="">About</a>
               <a href="">Episodes</a>
               <a href="">Host</a>
            </ul>
            <button class="hidden lg:flex justify-center items-center h-10 px-8 rounded font-seminbold text-white bg-linear-to-r from-yellow-600 to-pink-600 gap-x-2"><div>Subscribe</div><div><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 inline-block align-middle"> <path fill-rule="evenodd" d="M2 8c0 .414.336.75.75.75h8.69l-1.22 1.22a.75.75 0 1 0 1.06 1.06l2.5-2.5a.75.75 0 0 0 0-1.06l-2.5-2.5a.75.75 0 1 0-1.06 1.06l1.22 1.22H2.75A.75.75 0 0 0 2 8Z" clip-rule="evenodd" /></svg></div> </button>
            <!-- hamburger for small device -->
            <div class="lg:hidden sm:translate-x-25">  <img src="images/hamburger-menu.png" alt="menu">   </div>
        </nav>

        <!-- banner section -->
        <section class=" ">
            <div class="relative  min-h-screen flex  items-center">
                <!-- bg -->
                <img src="images/hero-bg.png" alt="" 
                   class="flex items-center  min-h-screen object-cover">
           
                <!-- circle -->
                <img src="images/hero-circle.png" alt="" 
                   class="absolute inset-0 m-auto -translate-y-20" >
                <!-- circle's child -->
                <img src="images/microphone.png" alt=""
                    class="absolute inset-0 m-auto -translate-y-20">
           
            </div>
            
        </section>  


    </header>
   
   
     
</body>
